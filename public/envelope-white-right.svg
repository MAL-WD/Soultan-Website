<svg width="420" height="320" viewBox="0 0 420 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Envelope body -->
  <rect x="20" y="60" width="380" height="240" rx="12" fill="white" fill-opacity="0.95"/>
  
  <!-- Envelope stroke -->
  <rect x="20" y="60" width="380" height="240" rx="12" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
  
  <!-- Envelope flap (top triangle) -->
  <path d="M20 60 L210 190 L400 60 Z" fill="white" fill-opacity="0.85"/>
  
  <!-- Flap fold line -->
  <path d="M20 60 L210 190 L400 60" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  
  <!-- Bottom fold lines -->
  <path d="M20 300 L180 185" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
  <path d="M400 300 L240 185" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Subtle inner shadow on flap -->
  <path d="M20 60 L210 190 L400 60 Z" fill="url(#flapGrad2)" fill-opacity="0.12"/>

  <defs>
    <linearGradient id="flapGrad2" x1="210" y1="60" x2="210" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#02110c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#02110c" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
